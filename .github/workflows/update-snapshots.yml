name: Update Playwright Snapshots
on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to update snapshots on"
        required: true
        default: main
jobs:
  update-snapshots:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
      - name: Update snapshots
        run: npx playwright test --update-snapshots
      - name: Commit updated snapshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b update-snapshots-linux
          git add tests/
          git diff --staged --quiet && echo "No snapshot changes" && exit 0
          git commit -m "chore: update playwright linux snapshots"
          git push origin update-snapshots-linux --force
      - name: Create Pull Request
        run: |
          gh pr create \
            --title "chore: update playwright linux snapshots" \
            --body "Auto-generated PR to update Playwright baseline screenshots for Linux CI." \
            --base ${{ github.event.inputs.branch }} \
            --head update-snapshots-linux || echo "PR already exists"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
